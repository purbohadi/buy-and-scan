# Auto-deploy to Cloudflare Workers when you push.
# Add repo secret: CLOUDFLARE_API_TOKEN (Workers Scripts:Edit + D1 + R2 as needed)
#
# - push to `main`  → ENV_MODE=production → scan-and-parse-production
# - push to `dev`   → ENV_MODE=development → scan-and-parse-dev
#
# If you also use Cloudflare "Connect to Git" Workers Builds, disable one path
# to avoid double deploys.

name: Deploy Worker

on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Deploy (production on main, development on dev)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENV_MODE: ${{ github.ref_name == 'main' && 'production' || 'development' }}
        run: npm run deploy:ci
